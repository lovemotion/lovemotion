# /etc/nginx/sites-available/lovemotion.io
#
# The rules-engine-era config with ONE change: `location /` now serves
# the static landing page (repo: site/) instead of proxying everything;
# the API keeps its exact public surface (/v1/*, /admin/*) on the
# hunchentoot :8080 backend. ACME challenge, TLS includes, security
# headers, and proxy settings preserved verbatim from the live conf.
#
# Deploy: deploy/deploy-site.sh (backs up the live conf, nginx -t before
# reload, rolls back on failure).

server {
    listen 80;
    listen [::]:80;
    server_name lovemotion.io www.lovemotion.io;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name lovemotion.io www.lovemotion.io;

    ssl_certificate     /etc/letsencrypt/live/lovemotion.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lovemotion.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           DENY                                  always;

    # --- static landing page (repo: site/) ---
    root  /var/www/lovemotion/site;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- API: the hunchentoot backend, surface unchanged ---
    location /v1/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /admin/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
